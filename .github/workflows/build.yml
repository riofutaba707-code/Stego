name: Build 32-bit EXE for Windows 7

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # рабочий образ Windows

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.8 (32-bit)
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
          architecture: 'x86'   # 32-разрядная версия

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==4.10
          pip install pillow stegano cryptography

      - name: Build EXE
        run: pyinstaller --onefile --windowed --hidden-import=tkinter --hidden-import=_tkinter --hidden-import=PIL._tkinter_finder VKR.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stego-32bit
          path: dist/
