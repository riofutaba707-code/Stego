name: Build 32-bit EXE for Windows 7 (cross)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            wine wine32 wine64 \
            python3 python3-pip python3-venv \
            mingw-w64 \
            xvfb

      - name: Set up Python environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install pyinstaller==4.10
          pip install pillow stegano cryptography

      - name: Build Windows 32-bit EXE
        run: |
          source venv/bin/activate
          # Указываем PyInstaller использовать 32-разрядный Python и упаковываем
          pyinstaller \
            --onefile \
            --windowed \
            --target-architecture=32bit \
            --hidden-import=tkinter \
            --hidden-import=_tkinter \
            --hidden-import=PIL._tkinter_finder \
            VKR.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: stego-32bit
          path: dist/
